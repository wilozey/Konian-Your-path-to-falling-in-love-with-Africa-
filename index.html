<!doctype html>
<html lang="en">
  <head>

    <title>Konian | Your path to falling in love with Africa</title>
    <meta
      name="description"
      content="Konian is an Africa-first travel discovery and planning marketplace for travellers, local guides, and cultural businesses."

    <meta name="theme-color" content="#1f5b45" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Konian" />
    <link rel="manifest" href="manifest.webmanifest" />

  <body>
    <div class="app-status" aria-hidden="true">

        <span>

      <nav class="nav-links" aria-label="Primary">
        <a href="#/discover">Discover</a>
        <a href="#/plan">Plan</a>

      </a>
      <a href="#/profile" data-nav="profile">
        <span>●</span>
        <small>Me</small>

    <script src="app.js"></script>
    <script>
      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        navigator.serviceWorker.register("./sw.js");
      }
